name: Terraform Deploy

on:
  push:
    branches: ["main"]
      
  workflow_dispatch:

permissions:
  contents: 'read'
  id-token: "write"

jobs:
  terraform-deploy:
    name: 'GCP Infrastructure Sync'
    runs-on: ubuntu-latest
    
    # Añadimos logs globales para el JOB
    env:
      TF_LOG: INFO  # INFO es suficiente para ver qué recurso está creando. Usa DEBUG para ver todo el tráfico.
      TF_VAR_host_project_id: ${{ secrets.GCP_PROJECT_ID }}
      TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}

    steps:
      - name: 'Checkout Source Code'
        uses: actions/checkout@v4

      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: 'Install Terraform'
        uses: hashicorp/setup-terraform@v3

      - name: 'Terraform Init'
        # Añadimos logs específicos para el init
        run: terraform -chdir=environments/host init

      - name: 'Terraform Apply'
        # Forzamos la salida detallada y activamos el trace
        run: |
          export TF_LOG=DEBUG 
          terraform -chdir=environments/host apply \
          -var-file="terraform.tfvars" \
          -auto-approve