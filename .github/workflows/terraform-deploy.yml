name: 'Terraform Deploy'

on:
  push:
    branches: ["main"]
  workflow_dispatch: # Permite ejecución manual desde la pestaña Actions

permissions:
  contents: 'read'
  id-token: 'write' # Obligatorio para la autenticación OIDC con Google Cloud

jobs:
  terraform-deploy:
    name: 'GCP Infrastructure Sync'
    runs-on: ubuntu-latest
    
    env:
      # Variables de entorno para que Terraform las recoja automáticamente
      TF_VAR_host_project_id: ${{ secrets.GCP_PROJECT_ID }}
      TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
      # Cambiamos a INFO para evitar logs excesivos, pero mantenemos DEBUG en el apply si falla
      TF_LOG: INFO 

    steps:
      - name: '1. Checkout Source Code'
        uses: actions/checkout@v4

      - id: 'auth'
        name: '2. Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: '3. Install Terraform'
        uses: hashicorp/setup-terraform@v3

      # -----------------------------------------------------------------------
      # FASE 1: REDES Y APIs (Carpeta Host)
      # -----------------------------------------------------------------------
      - name: '4. Terraform Init (Host)'
        run: terraform -chdir=environments/host init

      - name: '5. Terraform Apply (Host)'
        run: |
          terraform -chdir=environments/host apply \
            -var-file="terraform.tfvars" \
            -input=false \
            -auto-approve

      # -----------------------------------------------------------------------
      # FASE 2: CLÚSTER KUBERNETES (Carpeta Dev)
      # -----------------------------------------------------------------------
      - name: '6. Terraform Init (Dev)'
        run: terraform -chdir=environments/dev init

      - name: '7. Terraform Apply (Dev)'
        run: |
          # NOTA: Este paso tardará entre 10 y 15 minutos en la primera ejecución
          terraform -chdir=environments/dev apply \
            -var-file="terraform.tfvars" \
            -input=false \
            -auto-approve