name: 'Terraform Deploy'

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: 'read'
  id-token: 'write'

jobs:
  terraform-deploy:
    name: 'GCP Infrastructure Sync'
    runs-on: ubuntu-latest
    
    env:
      TF_VAR_host_project_id: ${{ secrets.GCP_PROJECT_ID_HOST }}
      TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID_DEV }}
      TF_LOG: INFO 

    steps:
      - name: '1. Checkout Source Code'
        uses: actions/checkout@v4

      - id: 'auth'
        name: '2. Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: '3. Install Terraform'
        uses: hashicorp/setup-terraform@v3

      # --- FASE 1: HOST ---
      - name: '4. Terraform Init (Host)'
        run: terraform -chdir=environments/host init

      - name: '5. Terraform Apply (Host)'
        run: |
          terraform -chdir=environments/host apply \
            -var-file="terraform.tfvars" \
            -auto-approve

      # --- FASE INTERMEDIA: SHARED VPC ---
      - name: '5.1. Terraform Init (Shared VPC Link)'
        run: terraform -chdir=modules/shared-vpc init

      - name: '5.2. Terraform Apply (Shared VPC Link)'
        run: |
          terraform -chdir=modules/shared-vpc apply \
            -var="host_project_id=zafa-host-zafa" \
            -var="service_project_id=zafa-dev-zafa" \
            -auto-approve

      # --- FASE 2: DEV ---
      - name: '6. Terraform Init (Dev)'
        run: terraform -chdir=environments/dev init

      - name: '7. Terraform Apply (Dev)'
        run: |
          terraform -chdir=environments/dev apply \
            -var-file="terraform.tfvars" \
            -auto-approve